name: Issue Validator

on:
  issues:
    types: [opened, edited]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check issue body
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const body = issue.body || '';
            const labels = issue.labels.map(l => l.name.toLowerCase());
            const title = issue.title.toLowerCase();
            
            let isInvalid = false;
            let message = '';
            
            // === BUG REPORT ===
            if (labels.includes('bug') || title.includes('[bug]')) {
              
              const requiredFields = [
                { name: 'Describe the bug', check: /describe the bug\s*\n+\s*\S+/i },
                { name: 'Steps to Reproduce', check: /steps to reproduce\s*\n+\s*\S+/i },
                { name: 'PegaProx Version', check: /pegaprox version:\s*\S+/i }
              ];
              
              const missing = requiredFields.filter(f => !f.check.test(body));
              
              if (missing.length > 0 || body.length < 100) {
                isInvalid = true;
                message = `👋 Thanks for reporting a bug!

Unfortunately, it looks like some required information is missing.

**Please provide:**
${missing.map(f => `- [ ] ${f.name}`).join('\n')}
${body.length < 100 ? '- [ ] More details (current description is too short)' : ''}

**Why?** 
We're volunteers maintaining PegaProx in our free time. Complete bug reports help us fix issues faster. 🐾

Closing for now — please reopen with the required details or open a new issue.

*This is an automated message.*`;
              }
            }
            
            // === FEATURE REQUEST ===
            if (labels.includes('enhancement') || labels.includes('feature') || title.includes('[feature]')) {
              
              const hasDescription = body.length > 50;
              const hasUseCase = /use case|why|problem|would like|should/i.test(body);
              
              if (!hasDescription) {
                isInvalid = true;
                message = `👋 Thanks for the feature request!

Unfortunately, we need a bit more detail to understand your idea.

**Please describe:**
- [ ] What feature would you like?
- [ ] Why? What problem does it solve?
- [ ] Any ideas how it could work?

Closing for now — please reopen with more details. 🐾

*This is an automated message.*`;
              }
            }
            
            // === CLOSE IF INVALID ===
            if (isInvalid) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: message
              });
              
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: ['incomplete']
              });
              
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed'
              });
              
              console.log('Issue closed: incomplete template');
            } else {
              console.log('Issue valid');
            }
